document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 Serif 4',serif;font-size:20px;color:#334155;margin-bottom:8px\">Chưa có từ để ôn tập<\u002Fdiv>\n            <div style=\"font-size:14px;color:#94a3b8;margin-bottom:20px\">Thêm vài từ ở tab Danh sách trước nhé.<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ goList }}\" style=\"padding:12px 22px;border:none;border-radius:10px;background:{{ accent }};color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer\">Đi tới Danh sách<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ hasWords }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"display:flex;gap:12px;align-items:center;justify-content:center;margin-bottom:20px;flex-wrap:wrap\">\n              <sc-raw-select value=\"{{ reviewTopicFilter }}\" sc-camel-on-change=\"{{ onReviewTopicChange }}\" style=\"padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:#f8fafc;color:#1e293b;outline:none\">\n                <option value=\"all\">Tất cả chủ đề<\u002Foption>\n                <sc-for list=\"{{ topics }}\" as=\"t\" hint-placeholder-count=\"0\">\n                  <option value=\"{{ t }}\">{{ t }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n              <sc-raw-select value=\"{{ reviewKnownFilter }}\" sc-camel-on-change=\"{{ onReviewKnownChange }}\" style=\"padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:#f8fafc;color:#1e293b;outline:none\">\n                <option value=\"all\">Tất cả trạng thái<\u002Foption>\n                <option value=\"unknown\">Chưa thuộc<\u002Foption>\n                <option value=\"known\">Đã thuộc<\u002Foption>\n              <\u002Fsc-raw-select>\n              <button sc-camel-on-click=\"{{ startReview }}\" style=\"padding:10px 18px;border:none;border-radius:10px;background:{{ accent }};color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer\">Bắt đầu / Trộn lại<\u002Fbutton>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ reviewQueueEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align:center;padding:60px 20px;color:#94a3b8;font-size:14px\">Không có từ nào khớp bộ lọc này.<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ hasCurrentCard }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:22px\">\n                <div style=\"font-size:13px;color:#94a3b8;font-weight:600\">{{ progressLabel }}<\u002Fdiv>\n                <div key=\"{{ cardKey }}\" sc-camel-on-click=\"{{ flipCard }}\" style=\"animation:cardIn 0.25s ease;width:100%;max-width:520px;min-height:280px;background:#fff;border:1px solid #e2e8f0;border-radius:20px;box-shadow:0 1px 3px rgba(30,41,59,0.06);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;cursor:pointer;text-align:center;box-sizing:border-box\">\n                  <sc-if value=\"{{ isFront }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div>\n                      <div style=\"font-family:'Source Serif 4',serif;font-size:36px;font-weight:600;color:#1e293b\">{{ currentCard.word }}<\u002Fdiv>\n                      <sc-if value=\"{{ currentCard.hasIpa }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"font-size:16px;color:#94a3b8;font-style:italic;margin-top:10px\">{{ currentCard.ipa }}<\u002Fdiv>\n                      <\u002Fsc-if>\n                      <div style=\"font-size:12px;color:#64748b;background:#f1f5f9;display:inline-block;padding:3px 10px;border-radius:6px;margin-top:14px\">{{ currentCard.pos }}<\u002Fdiv>\n                      <div style=\"font-size:12px;color:#94a3b8;margin-top:24px\">Chạm để lật thẻ<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ isBack }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div>\n                      <div style=\"font-size:22px;font-weight:600;color:#1e293b\">{{ currentCard.meaning }}<\u002Fdiv>\n                      <sc-if value=\"{{ currentCard.hasExample }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"font-size:15px;color:#64748b;font-style:italic;margin-top:14px\">\"{{ currentCard.example }}\"<\u002Fdiv>\n                      <\u002Fsc-if>\n                      <div style=\"font-size:12px;color:#94a3b8;margin-top:24px\">Chạm để lật lại<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n\n                <div style=\"display:flex;gap:12px\">\n                  <button sc-camel-on-click=\"{{ prevCard }}\" style=\"padding:12px 20px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;color:#64748b;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer\">← Trước<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ markUnknown }}\" style=\"padding:12px 22px;border:none;border-radius:10px;background:{{ dangerSoft }};color:{{ danger }};font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer\">Chưa thuộc<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ markKnown }}\" style=\"padding:12px 22px;border:none;border-radius:10px;background:{{ successSoft }};color:{{ success }};font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer\">Đã thuộc ✓<\u002Fbutton>\n                  <button sc-camel-on-click=\"{{ nextCard }}\" style=\"padding:12px 20px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;color:#64748b;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer\">Tiếp →<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isStatsScreen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <sc-if value=\"{{ isEmptyOverall }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:80px 20px;color:#94a3b8;font-size:14px\">Thêm từ vựng để xem thống kê.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ hasWords }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px\">\n              <div style=\"background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:22px;text-align:center\">\n                <div style=\"font-size:32px;font-weight:800;color:#1e293b\">{{ totalCount }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#64748b;margin-top:4px\">Tổng số từ<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:{{ successSoft }};border:1px solid #e2e8f0;border-radius:14px;padding:22px;text-align:center\">\n                <div style=\"font-size:32px;font-weight:800;color:{{ success }}\">{{ knownCount }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#64748b;margin-top:4px\">Đã thuộc<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:{{ accentSoft }};border:1px solid #e2e8f0;border-radius:14px;padding:22px;text-align:center\">\n                <div style=\"font-size:32px;font-weight:800;color:{{ accent }}\">{{ knownPercent }}%<\u002Fdiv>\n                <div style=\"font-size:13px;color:#64748b;margin-top:4px\">Tiến độ hoàn thành<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:14px;font-weight:700;color:#1e293b;margin-bottom:14px\">Theo chủ đề<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <sc-for list=\"{{ topicStats }}\" as=\"ts\" hint-placeholder-count=\"3\">\n                <div>\n                  <div style=\"display:flex;justify-content:space-between;font-size:13px;color:#334155;margin-bottom:6px\">\n                    <span style=\"font-weight:600\">{{ ts.topic }}<\u002Fspan>\n                    <span style=\"color:#94a3b8\">{{ ts.known }}/{{ ts.total }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"background:#f1f5f9;border-radius:6px;height:8px;overflow:hidden\">\n                    <div style=\"background:{{ accent }};height:100%;border-radius:6px;width:{{ ts.pct }}%\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1100, &quot;height&quot;: 800}, &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;oklch(58% 0.16 255)&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;shuffleReview&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}, &quot;showIPA&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;}}\">\nconst STORAGE_KEY = 'vocab_words_v1';\nconst DRIVE_CLIENT_ID = '408690735220-monnc90hu3ov36oevfpa93bkh49t49s5.apps.googleusercontent.com';\nconst DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';\nconst DRIVE_FILE_NAME = 'vocab_words.json';\nconst emptyForm = { word: '', ipa: '', pos: 'danh từ', meaning: '', example: '', topic: '', level: 'Cơ bản' };\n\nclass Component extends DCLogic {\n  state = {\n    words: [],\n    screen: 'list',\n    showAddForm: false,\n    editingId: null,\n    form: { ...emptyForm },\n    search: '',\n    topicFilter: 'all',\n    levelFilter: 'all',\n    reviewQueue: [],\n    reviewIndex: 0,\n    flipped: false,\n    reviewTopicFilter: 'all',\n    reviewKnownFilter: 'all',\n    driveSignedIn: false,\n    driveEmail: null,\n    syncStatus: 'idle',\n  };\n\n  accessToken = null;\n  driveFileId = null;\n  tokenClient = null;\n  saveTimer = null;\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(STORAGE_KEY);\n      if (raw) this.setState({ words: JSON.parse(raw) });\n    } catch (e) {}\n    this.waitForGis();\n  }\n\n  waitForGis = () => {\n    if (window.google && window.google.accounts && window.google.accounts.oauth2) {\n      this.tokenClient = window.google.accounts.oauth2.initTokenClient({\n        client_id: DRIVE_CLIENT_ID,\n        scope: DRIVE_SCOPE,\n        callback: (resp) => {\n          if (resp && resp.access_token) {\n            this.accessToken = resp.access_token;\n            this.setState({ driveSignedIn: true, syncStatus: 'syncing' });\n            this.syncFromDrive();\n          }\n        },\n      });\n    } else {\n      setTimeout(this.waitForGis, 300);\n    }\n  };\n\n  toggleDrive = () => {\n    if (this.state.driveSignedIn) {\n      if (this.accessToken && window.google) {\n        window.google.accounts.oauth2.revoke(this.accessToken, () => {});\n      }\n      this.accessToken = null;\n      this.driveFileId = null;\n      this.setState({ driveSignedIn: false, driveEmail: null, syncStatus: 'idle' });\n    } else if (this.tokenClient) {\n      this.tokenClient.requestAccessToken();\n    }\n  };\n\n  async driveFetch(url, options = {}) {\n    const res = await fetch(url, {\n      ...options,\n      headers: { ...(options.headers || {}), Authorization: `Bearer ${this.accessToken}` },\n    });\n    if (!res.ok) throw new Error('drive request failed: ' + res.status);\n    return res;\n  }\n\n  async syncFromDrive() {\n    try {\n      const listRes = await this.driveFetch(\n        `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${encodeURIComponent(\"name='\" + DRIVE_FILE_NAME + \"'\")}&fields=files(id,name)`\n      );\n      const listJson = await listRes.json();\n      const existing = (listJson.files || [])[0];\n      if (existing) {\n        this.driveFileId = existing.id;\n        const contentRes = await this.driveFetch(`https://www.googleapis.com/drive/v3/files/${existing.id}?alt=media`);\n        const remoteWords = await contentRes.json();\n        if (Array.isArray(remoteWords)) {\n          this.persist(remoteWords);\n          this.setState({ words: remoteWords });\n        }\n      } else {\n        await this.createDriveFile(this.state.words);\n      }\n      let email = null;\n      try {\n        const infoRes = await this.driveFetch('https://www.googleapis.com/oauth2/v2/userinfo');\n        const info = await infoRes.json();\n        email = info.email || null;\n      } catch (e) {}\n      this.setState({ syncStatus: 'synced', driveEmail: email });\n    } catch (e) {\n      this.setState({ syncStatus: 'error' });\n    }\n  }\n\n  async createDriveFile(words) {\n    const metadata = { name: DRIVE_FILE_NAME, parents: ['appDataFolder'] };\n    const boundary = 'vocabboundary';\n    const body =\n      `--${boundary}\\r\\nContent-Type: application/json; charset=UTF-8\\r\\n\\r\\n${JSON.stringify(metadata)}\\r\\n` +\n      `--${boundary}\\r\\nContent-Type: application/json\\r\\n\\r\\n${JSON.stringify(words)}\\r\\n--${boundary}--`;\n    const res = await this.driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {\n      method: 'POST',\n      headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },\n      body,\n    });\n    const json = await res.json();\n    this.driveFileId = json.id;\n  }\n\n  scheduleDriveSave(words) {\n    if (!this.state.driveSignedIn) return;\n    clearTimeout(this.saveTimer);\n    this.setState({ syncStatus: 'syncing' });\n    this.saveTimer = setTimeout(async () => {\n      try {\n        if (!this.driveFileId) {\n          await this.createDriveFile(words);\n        } else {\n          await this.driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${this.driveFileId}?uploadType=media`, {\n            method: 'PATCH',\n            headers: { 'Content-Type': 'application/json' },\n            body: JSON.stringify(words),\n          });\n        }\n        this.setState({ syncStatus: 'synced' });\n      } catch (e) {\n        this.setState({ syncStatus: 'error' });\n      }\n    }, 1200);\n  }\n\n  persist(words) {\n    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(words)); } catch (e) {}\n  }\n\n  updateWords(words) {\n    this.persist(words);\n    const validIds = new Set(words.map(w => w.id));\n    const reviewQueue = this.state.reviewQueue.filter(id => validIds.has(id));\n    this.setState({ words, reviewQueue, reviewIndex: Math.min(this.state.reviewIndex, Math.max(reviewQueue.length - 1, 0)) });\n    this.scheduleDriveSave(words);\n  }\n\n  goList = () => this.setState({ screen: 'list' });\n  goReview = () => {\n    this.setState({ screen: 'review' });\n    if (this.state.reviewQueue.length === 0) this.startReview();\n  };\n  goStats = () => this.setState({ screen: 'stats' });\n\n  toggleAddForm = () => {\n    if (this.state.showAddForm) {\n      this.setState({ showAddForm: false, editingId: null, form: { ...emptyForm } });\n    } else {\n      this.setState({ showAddForm: true, editingId: null, form: { ...emptyForm } });\n    }\n  };\n  cancelForm = () => this.setState({ showAddForm: false, editingId: null, form: { ...emptyForm } });\n\n  onFormField(key, value) {\n    this.setState({ form: { ...this.state.form, [key]: value } });\n  }\n\n  submitForm = () => {\n    const f = this.state.form;\n    if (!f.word.trim() || !f.meaning.trim()) return;\n    let words;\n    if (this.state.editingId) {\n      words = this.state.words.map(w => w.id === this.state.editingId ? { ...w, ...f } : w);\n    } else {\n      words = [...this.state.words, { id: Date.now() + Math.random(), ...f, known: false, addedAt: Date.now() }];\n    }\n    this.updateWords(words);\n    this.setState({ showAddForm: false, editingId: null, form: { ...emptyForm } });\n  };\n\n  editWord(id) {\n    const w = this.state.words.find(x => x.id === id);\n    if (!w) return;\n    this.setState({\n      showAddForm: true,\n      editingId: id,\n      form: { word: w.word, ipa: w.ipa || '', pos: w.pos, meaning: w.meaning, example: w.example || '', topic: w.topic || '', level: w.level },\n    });\n  }\n\n  removeWord(id) {\n    this.updateWords(this.state.words.filter(w => w.id !== id));\n  }\n\n  toggleKnown(id) {\n    this.updateWords(this.state.words.map(w => w.id === id ? { ...w, known: !w.known } : w));\n  }\n\n  onSearchChange = (e) => this.setState({ search: e.target.value });\n  onTopicFilterChange = (e) => this.setState({ topicFilter: e.target.value });\n  onLevelFilterChange = (e) => this.setState({ levelFilter: e.target.value });\n  onReviewTopicChange = (e) => { this.setState({ reviewTopicFilter: e.target.value }); setTimeout(this.startReview, 0); };\n  onReviewKnownChange = (e) => { this.setState({ reviewKnownFilter: e.target.value }); setTimeout(this.startReview, 0); };\n\n  startReview = () => {\n    let pool = this.state.words.slice();\n    if (this.state.reviewTopicFilter !== 'all') pool = pool.filter(w => (w.topic || '') === this.state.reviewTopicFilter);\n    if (this.state.reviewKnownFilter === 'known') pool = pool.filter(w => w.known);\n    if (this.state.reviewKnownFilter === 'unknown') pool = pool.filter(w => !w.known);\n    if (this.props.shuffleReview ?? true) {\n      for (let i = pool.length - 1; i > 0; i--) {\n        const j = Math.floor(Math.random() * (i + 1));\n        [pool[i], pool[j]] = [pool[j], pool[i]];\n      }\n    }\n    this.setState({ reviewQueue: pool.map(w => w.id), reviewIndex: 0, flipped: false });\n  };\n\n  flipCard = () => this.setState({ flipped: !this.state.flipped });\n  nextCard = () => {\n    const q = this.state.reviewQueue;\n    this.setState({ reviewIndex: Math.min(this.state.reviewIndex + 1, q.length - 1), flipped: false });\n  };\n  prevCard = () => this.setState({ reviewIndex: Math.max(this.state.reviewIndex - 1, 0), flipped: false });\n  markKnown = () => {\n    const id = this.state.reviewQueue[this.state.reviewIndex];\n    if (id != null) this.updateWords(this.state.words.map(w => w.id === id ? { ...w, known: true } : w));\n    this.nextCard();\n  };\n  markUnknown = () => {\n    const id = this.state.reviewQueue[this.state.reviewIndex];\n    if (id != null) this.updateWords(this.state.words.map(w => w.id === id ? { ...w, known: false } : w));\n    this.nextCard();\n  };\n\n  renderVals() {\n    const accent = this.props.accentColor || 'oklch(58% 0.16 255)';\n    const accentDark = 'oklch(46% 0.16 255)';\n    const accentSoft = 'oklch(94% 0.03 255)';\n    const success = 'oklch(55% 0.13 150)';\n    const successSoft = 'oklch(95% 0.03 150)';\n    const danger = 'oklch(55% 0.17 25)';\n    const dangerSoft = 'oklch(95% 0.03 25)';\n    const showIPA = this.props.showIPA ?? true;\n\n    const { words, screen, search, topicFilter, levelFilter } = this.state;\n\n    const topics = [...new Set(words.map(w => w.topic).filter(Boolean))];\n\n    const tabActive = { background: accent, colorTxt: '#fff' };\n    const tabInactive = { background: 'transparent', colorTxt: '#64748b' };\n    const tabBg = {\n      list: screen === 'list' ? tabActive.background : tabInactive.background,\n      review: screen === 'review' ? tabActive.background : tabInactive.background,\n      stats: screen === 'stats' ? tabActive.background : tabInactive.background,\n    };\n    const tabColor = {\n      list: screen === 'list' ? tabActive.colorTxt : tabInactive.colorTxt,\n      review: screen === 'review' ? tabActive.colorTxt : tabInactive.colorTxt,\n      stats: screen === 'stats' ? tabActive.colorTxt : tabInactive.colorTxt,\n    };\n    const tabBgHover = {\n      list: screen === 'list' ? tabActive.background : '#e2e8f0',\n      review: screen === 'review' ? tabActive.background : '#e2e8f0',\n      stats: screen === 'stats' ? tabActive.background : '#e2e8f0',\n    };\n\n    const searchLower = search.trim().toLowerCase();\n    let filteredWords = words.filter(w => {\n      if (searchLower && !(w.word.toLowerCase().includes(searchLower) || w.meaning.toLowerCase().includes(searchLower))) return false;\n      if (topicFilter !== 'all' && (w.topic || '') !== topicFilter) return false;\n      if (levelFilter !== 'all' && w.level !== levelFilter) return false;\n      return true;\n    }).map(w => ({\n      ...w,\n      hasIpa: !!(w.ipa && w.ipa.trim() && showIPA),\n      hasExample: !!(w.example && w.example.trim()),\n      hasTopic: !!(w.topic && w.topic.trim()),\n      knownLabel: w.known ? 'Đã thuộc ✓' : 'Chưa thuộc',\n      knownBg: w.known ? successSoft : '#f8fafc',\n      knownColor: w.known ? success : '#94a3b8',\n      knownBorder: w.known ? successSoft : '#e2e8f0',\n      toggleKnown: () => this.toggleKnown(w.id),\n      edit: () => this.editWord(w.id),\n      remove: () => this.removeWord(w.id),\n    }));\n\n    const totalCount = words.length;\n    const knownCount = words.filter(w => w.known).length;\n    const knownPercent = totalCount ? Math.round((knownCount / totalCount) * 100) : 0;\n    const topicStats = topics.map(t => {\n      const inTopic = words.filter(w => w.topic === t);\n      const known = inTopic.filter(w => w.known).length;\n      return { topic: t, total: inTopic.length, known, pct: inTopic.length ? Math.round((known / inTopic.length) * 100) : 0 };\n    });\n\n    const queue = this.state.reviewQueue;\n    const idx = this.state.reviewIndex;\n    const currentId = queue[idx];\n    const currentWord = currentId != null ? words.find(w => w.id === currentId) : null;\n    const currentCard = currentWord ? {\n      ...currentWord,\n      hasIpa: !!(currentWord.ipa && currentWord.ipa.trim() && showIPA),\n      hasExample: !!(currentWord.example && currentWord.example.trim()),\n    } : null;\n\n    const driveLabels = {\n      idle: 'Đăng nhập Google Drive',\n      syncing: 'Đang đồng bộ...',\n      synced: `✓ ${this.state.driveEmail || 'Đã đồng bộ'}`,\n      error: 'Lỗi đồng bộ — thử lại',\n    };\n    const driveButtonLabel = this.state.driveSignedIn ? driveLabels[this.state.syncStatus] || driveLabels.idle : driveLabels.idle;\n    const driveButtonBg = this.state.driveSignedIn ? successSoft : '#fff';\n    const driveButtonColor = this.state.driveSignedIn ? success : '#334155';\n    const driveButtonBorder = this.state.driveSignedIn ? successSoft : '#e2e8f0';\n\n    return {\n      driveButtonLabel, driveButtonBg, driveButtonColor, driveButtonBorder, toggleDrive: this.toggleDrive,\n      accent, accentDark, accentSoft, success, successSoft, danger, dangerSoft, showIPA,\n      isListScreen: screen === 'list',\n      isReviewScreen: screen === 'review',\n      isStatsScreen: screen === 'stats',\n      goList: this.goList, goReview: this.goReview, goStats: this.goStats,\n      tabBg, tabColor, tabBgHover,\n      search, topicFilter, levelFilter, topics,\n      onSearchChange: this.onSearchChange, onTopicFilterChange: this.onTopicFilterChange, onLevelFilterChange: this.onLevelFilterChange,\n      showAddForm: this.state.showAddForm,\n      toggleAddForm: this.toggleAddForm, cancelForm: this.cancelForm, submitForm: this.submitForm,\n      addButtonLabel: this.state.showAddForm ? 'Đóng' : '+ Thêm từ mới',\n      submitLabel: this.state.editingId ? 'Lưu thay đổi' : 'Thêm từ',\n      form: this.state.form,\n      onFormChange_word: (e) => this.onFormField('word', e.target.value),\n      onFormChange_ipa: (e) => this.onFormField('ipa', e.target.value),\n      onFormChange_pos: (e) => this.onFormField('pos', e.target.value),\n      onFormChange_meaning: (e) => this.onFormField('meaning', e.target.value),\n      onFormChange_example: (e) => this.onFormField('example', e.target.value),\n      onFormChange_topic: (e) => this.onFormField('topic', e.target.value),\n      onFormChange_level: (e) => this.onFormField('level', e.target.value),\n      hasWords: filteredWords.length > 0,\n      noResultsAfterFilter: filteredWords.length === 0 && words.length > 0,\n      isEmptyOverall: words.length === 0,\n      filteredWords,\n      reviewTopicFilter: this.state.reviewTopicFilter,\n      reviewKnownFilter: this.state.reviewKnownFilter,\n      onReviewTopicChange: this.onReviewTopicChange, onReviewKnownChange: this.onReviewKnownChange,\n      startReview: this.startReview,\n      reviewQueueEmpty: queue.length === 0,\n      hasCurrentCard: !!currentCard,\n      currentCard,\n      cardKey: `${currentId}-${this.state.flipped}`,\n      isFront: !this.state.flipped,\n      isBack: this.state.flipped,\n      progressLabel: queue.length ? `${idx + 1} / ${queue.length}` : '',\n      flipCard: this.flipCard, nextCard: this.nextCard, prevCard: this.prevCard,\n      markKnown: this.markKnown, markUnknown: this.markUnknown,\n      totalCount, knownCount, knownPercent, topicStats,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
